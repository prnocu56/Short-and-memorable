<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RNG - Ultimate 25 Tier Edition</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000000; 
            color: #e2e4e9;
            font-family: sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            overflow: hidden;
            box-sizing: border-box;
            position: relative;
            transition: background-color 0.4s ease;
        }

        #themeBgEffect {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -2;
            pointer-events: none;
            overflow: hidden;
        }

        .top-bar {
            width: 100%;
            padding: 20px;
            display: flex;
            justify-content: flex-start;
            gap: 10px;
            box-sizing: border-box;
            z-index: 10;
        }

        .inv-btn { padding: 10px 20px; font-size: 0.9rem; font-weight: bold; background: #e74c3c; border: none; color: #fff; border-radius: 4px; cursor: pointer; }
        .auto-btn { padding: 10px 20px; font-size: 0.9rem; font-weight: bold; background: #34495e; border: none; color: #fff; border-radius: 4px; cursor: pointer; }
        .trade-hub-btn { padding: 10px 20px; font-size: 0.9rem; font-weight: bold; background: #f1c40f; border: none; color: #000; border-radius: 4px; cursor: pointer; }
        .promo-btn { padding: 10px 15px; font-size: 0.9rem; font-weight: bold; background: #8e44ad; border: none; color: #fff; border-radius: 4px; cursor: pointer; margin-left: auto; }

        .center-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: auto;
            margin-bottom: auto;
            z-index: 5;
        }

        .pet-slot {
            width: 60px;
            height: 60px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.2rem;
        }

        .slot-box {
            width: 260px;
            height: 140px;
            background: rgba(0, 0, 0, 0.9); 
            border: 2px solid #222;
            border-radius: 6px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 10px;
            box-sizing: border-box;
            transition: border-color 0.3s ease;
        }

        .slot-text { font-size: 1.8rem; font-weight: bold; text-align: center; }
        .slot-rate { font-size: 0.85rem; color: #666; margin-top: 8px; }

        .bottom-area {
            margin-bottom: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            width: 100%;
            z-index: 10;
        }

        .counter { font-size: 0.9rem; color: #444; letter-spacing: 1px; }
        .btn-group { display: flex; gap: 10px; }

        .roll-normal-btn { padding: 12px 30px; font-size: 1.1rem; font-weight: bold; background: #f1c40f; color: #000; border: none; border-radius: 4px; cursor: pointer; transition: all 0.3s ease; }
        .autoroll-btn { padding: 12px 20px; font-size: 1.1rem; font-weight: bold; background: #2ecc71; color: #fff; border: none; border-radius: 4px; cursor: pointer; }
        .autoroll-btn.locked { background: #222; color: #666; }
        .autoroll-btn.active { background: #e74c3c; }
        .roll-normal-btn:disabled, .autoroll-btn:disabled { background: #111; color: #444; cursor: not-allowed; opacity: 0.6; }

        /* Paneller */
        .full-screen-panel {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000000; 
            z-index: 100;
            display: none;
            flex-direction: column;
            box-sizing: border-box;
        }

        .panel-header { padding: 20px; border-bottom: 1px solid #111; display: flex; justify-content: space-between; align-items: center; }
        .panel-title { font-size: 1.2rem; font-weight: bold; color: #fff; }
        .close-btn { background: none; border: none; color: #888; font-size: 1.5rem; cursor: pointer; }

        .inv-grid { flex: 1; padding: 20px; overflow-y: auto; display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; align-content: start; }
        
        .inv-card {
            background: #050505; 
            border: 1px solid #222;
            border-radius: 4px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 75px;
            box-sizing: border-box;
            cursor: pointer;
            position: relative;
        }
        .inv-card.equipped-item { border-color: #2ecc71 !important; background: #031408; }
        .inv-card.equipped-item::before { content: "👑"; position: absolute; top: 2px; left: 5px; font-size: 0.75rem; }

        .item-name { font-size: 0.95rem; font-weight: bold; margin-top: 5px; }
        .item-rate { font-size: 0.75rem; color: #555; }

        /* Pop-up Menüsü */
        .action-popup {
            position: fixed;
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #0a0a0a; border: 1px solid #333; padding: 20px;
            border-radius: 6px; z-index: 150; display: none;
            flex-direction: column; gap: 10px; width: 260px; box-sizing: border-box;
        }
        .popup-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 140; display: none; }
        .popup-btn { padding: 12px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; text-align: center; font-size: 0.9rem; }
        .popup-btn.equip { background: #2ecc71; color: #fff; }
        .popup-btn.delete { background: #e74c3c; color: #fff; }
        .popup-btn.cancel { background: #333; color: #fff; }

        /* Yeni Takas Giriş Ekranı Tasarımı */
        .trade-hub-container { padding: 30px; display: flex; flex-direction: column; gap: 25px; align-items: center; justify-content: center; height: 100%; box-sizing: border-box; }
        .trade-hub-box { width: 100%; max-width: 400px; background: #050505; border: 1px solid #222; padding: 20px; border-radius: 6px; text-align: center; box-sizing: border-box; }
        .trade-hub-text { font-size: 0.95rem; color: #aaa; margin-top: 15px; line-height: 1.4; font-weight: bold; }
        
        /* Gerçek Takas Masası */
        .trade-container { display: flex; flex-direction: column; height: 100%; }
        .trade-split-zone { flex: 1; display: flex; border-bottom: 1px solid #111; overflow: hidden; }
        .trade-side { flex: 1; display: flex; flex-direction: column; padding: 15px; box-sizing: border-box; overflow-y: auto; }
        .trade-side.left { border-right: 1px solid #111; background: #020202; }
        .trade-side.right { background: #040404; }
        .side-title { font-size: 0.9rem; font-weight: bold; color: #888; margin-bottom: 10px; text-transform: uppercase; display: flex; justify-content: space-between; align-items: center; }
        .add-to-trade-btn { background: #2ecc71; color: #fff; border: none; padding: 4px 10px; font-size: 0.85rem; font-weight: bold; border-radius: 3px; cursor: pointer; }
        .trade-box-list { display: flex; flex-direction: column; gap: 6px; }
        .mini-trade-card { background: #000; border: 1px solid #151515; padding: 8px 12px; border-radius: 4px; display: flex; justify-content: space-between; align-items: center; font-size: 0.85rem; }
        .remove-trade-item { color: #e74c3c; cursor: pointer; font-weight: bold; margin-left: 10px; }
        
        .trade-controls-zone { padding: 15px 20px; background: #050505; display: flex; flex-direction: column; gap: 12px; box-sizing: border-box; }
        .action-btn { padding: 12px; border: none; border-radius: 4px; font-weight: bold; font-size: 0.95rem; cursor: pointer; text-align: center; }
        .btn-gold { background: #f1c40f; color: #000; }
        .btn-green { background: #2ecc71; color: #fff; }
        .btn-green.ready-active { background: #e74c3c; }
        .btn-blue { background: #3498db; color: #fff; width: 100%; max-width: 400px; }
        .trade-input { background: #000; border: 1px solid #222; color: #fff; padding: 12px; border-radius: 4px; font-size: 0.9rem; width: 100%; box-sizing: border-box; text-align: center; }

        .auto-list-container { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
        .auto-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 15px; background: #050505; border: 1px solid #111; border-radius: 4px; cursor: pointer; }
        .auto-row-info { display: flex; flex-direction: column; gap: 2px; }
        .auto-checkbox { width: 18px; height: 18px; accent-color: #ff3333; cursor: pointer; }

        /* Seçim Penceresi */
        .selector-panel { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 200; display: none; flex-direction: column; }

        /* Gelişmiş Animasyon Efektleri */
        .spinning { animation: slotBlur 0.06s infinite linear; }
        @keyframes slotBlur {
            0% { transform: translateY(-4px); opacity: 0.5; }
            100% { transform: translateY(4px); opacity: 0.5; }
        }

        @keyframes petFloat {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-6px); }
            100% { transform: translateY(0px); }
        }
        .floating-pet { animation: petFloat 2s infinite ease-in-out; }
        @keyframes spinAround { 100% { transform: rotate(360deg); } }
        .spinning-pet { animation: spinAround 4s infinite linear; }

        .matrix-bg { background: linear-gradient(rgba(0, 0, 0, 0.92), rgba(0, 0, 0, 0.92)), url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100"><text x="10" y="20" fill="%230f0" font-family="monospace" font-size="10">1010110</text><text x="50" y="60" fill="%230f0" font-family="monospace" font-size="12">0110</text></svg>'); background-size: 100px 100px; }
        .solar-sun { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 240px; height: 240px; background: radial-gradient(circle, #f1c40f 0%, #e67e22 50%, transparent 70%); filter: blur(15px); opacity: 0.5; }
        .lunar-moon { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 200px; height: 200px; background: radial-gradient(circle, #ffffff 0%, #bdc3c7 50%, transparent 70%); opacity: 0.35; }
        .demon-horns { position: absolute; bottom: 0; width: 100%; height: 50%; background: linear-gradient(to top, rgba(231, 76, 60, 0.15), transparent); display: flex; justify-content: space-between; padding: 0 40px; box-sizing: border-box; }
        .demon-horns::before, .demon-horns::after { content: "😈"; font-size: 7rem; opacity: 0.12; filter: blur(1px); }
        .toilet-slipper-aura { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 10rem; opacity: 0.08; filter: blur(2px); animation: petFloat 3s infinite ease-in-out; }
    </style>
</head>

    <script>
/* ===== HubLand hesaba özel kayıt katmanı ===== */
(function(){
  const GAME_PREFIXES=['rng_'];
  const UID_SESSION_KEY='hubland_active_uid';
  const MIGRATION_OWNER_KEY='hubland_legacy_owner_rng';
  const rawGet=Storage.prototype.getItem;
  const rawSet=Storage.prototype.setItem;
  const rawRemove=Storage.prototype.removeItem;
  const rawKey=Storage.prototype.key;
  function activeUid(){ return sessionStorage.getItem(UID_SESSION_KEY)||''; }
  function isGameKey(key){ return GAME_PREFIXES.some(p=>String(key).startsWith(p)); }
  function scopedKey(key){
    const uid=activeUid();
    return uid&&isGameKey(key)?'__hubland_'+uid+'__'+key:String(key);
  }
  Storage.prototype.getItem=function(key){
    if(this===localStorage) return rawGet.call(this,scopedKey(key));
    return rawGet.call(this,key);
  };
  Storage.prototype.setItem=function(key,value){
    if(this===localStorage) return rawSet.call(this,scopedKey(key),value);
    return rawSet.call(this,key,value);
  };
  Storage.prototype.removeItem=function(key){
    if(this===localStorage) return rawRemove.call(this,scopedKey(key));
    return rawRemove.call(this,key);
  };
  function migrateLegacyTo(uid){
    if(!uid)return;
    const owner=rawGet.call(localStorage,MIGRATION_OWNER_KEY);
    if(owner)return;
    const keys=[];
    for(let i=0;i<localStorage.length;i++){
      const k=rawKey.call(localStorage,i);
      if(k&&isGameKey(k)&&!k.startsWith('__hubland_'))keys.push(k);
    }
    for(const k of keys){
      const value=rawGet.call(localStorage,k);
      const target='__hubland_'+uid+'__'+k;
      if(value!==null&&rawGet.call(localStorage,target)===null) rawSet.call(localStorage,target,value);
    }
    rawSet.call(localStorage,MIGRATION_OWNER_KEY,uid);
  }
  window.addEventListener('message',function(e){
    const d=e.data||{};
    if(d.type!=='HUBLAND_AUTH_CONTEXT')return;
    const next=String(d.uid||'');
    const current=activeUid();
    if(next&&next!==current){
      migrateLegacyTo(next);
      sessionStorage.setItem(UID_SESSION_KEY,next);
      location.reload();
    }
  });
  try{if(window.parent&&window.parent!==window)window.parent.postMessage({type:'HUBLAND_REQUEST_AUTH_CONTEXT'},'*')}catch(_){}
})();
/* ===== /HubLand hesaba özel kayıt katmanı ===== */

        const itemsPool = [
            { name: "Common", rate: 2, text: "#888888" },
            { name: "Uncommon", rate: 4, text: "#2ecc71" },
            { name: "Rare", rate: 8, text: "#3498db" },

            { name: "Galaxy", rate: 4096, text: "#2980b9" },
            { name: "Supernova", rate: 8192, text: "#e74c3c" },
            { name: "Quasar", rate: 16384, text: "#9b59b6" },
            { name: "Black Hole", rate: 32768, text: "#553377" },
            { name: "Angel", rate: 65536, text: "#ffffff" },
            { name: "Demon", rate: 131072, text: "#ff0000" },
            { name: "Divine", rate: 262144, text: "#eeeeee" },
            { name: "Eternal", rate: 524288, text: "#f39c12" },
            { name: "Infinity", rate: 1048576, text: "#ffffff" },
            { name: "Omega", rate: 2097152, text: "#ff3333" },
            { name: "Reality", rate: 4194304, text: "#bdc3c7" },
            { name: "Dream", rate: 8388608, text: "#ffb6c1" },
            { name: "Void King", rate: 16777216, text: "#9b59b6" },
            { name: "TRUE GOD", rate: 33554432, text: "#ff00ff" }
        ];

        let rollCount = 0;
        let isAutoRolling = false;
        let currentSpinTimeout = null;
        
        let inventory = JSON.parse(localStorage.getItem('rng_game_inventory')) || [];
        let autoDeleteFilters = JSON.parse(localStorage.getItem('rng_auto_delete_filters')) || {};
        let equippedItemName = localStorage.getItem('rng_equipped_item') || "Common";
        let usedTradeIds = JSON.parse(localStorage.getItem('rng_used_trade_ids')) || [];
        
        // Yeni dinamik masaların verileri
        let myTableItems = [];
        let theirTableItems = [];
        let amIReady = false;

        let isAutoRollUnlocked = checkKeyExist();
        
        updateAutoRollButtonUI();
                applyEquippedTheme(equippedItemName);

        function checkKeyExist() { return inventory.some(item => item.name === "Key"); }

        function updateAutoRollButtonUI() {
            const autoBtn = document.getElementById('autoRollBtn');
            if (isAutoRollUnlocked) {
                autoBtn.classList.remove('locked');
                autoBtn.innerText = isAutoRolling ? "STOP ROLL" : "AUTO ROLL";
                if (isAutoRolling) autoBtn.classList.add('active'); else autoBtn.classList.remove('active');
            } else {
                autoBtn.classList.add('locked');
                autoBtn.innerText = "🔒 AUTO ROLL";
            }
        }

        function handleAutoRollClick() {
            if (!isAutoRollUnlocked) {
                const passwordAttempt = prompt("Auto Roll özelliğini açmak için gizli şifreyi girin:");
                if (passwordAttempt === "İmAgay7812") {
                    alert("Kilit Açıldı! Envanterinize metalik sarı bir 'Key' eklendi.");
                    isAutoRollUnlocked = true;
                    inventory.push({ name: "Key", rate: 2, text: "#d4af37", id: "KEY_" + Date.now() });
                    localStorage.setItem('rng_game_inventory', JSON.stringify(inventory));
                    updateAutoRollButtonUI();
                } else if (passwordAttempt !== null) { alert("Yanlış Şifre!"); }
            } else { toggleAutoRoll(); }
        }

        function openPanel(id) {
            document.getElementById(id).style.display = 'flex';
            if (id === 'invScreen') { renderInventory(); }
            else if (id === 'autoScreen') { renderAutoDeleteList(); }
        }

        function closePanel(id) { document.getElementById(id).style.display = 'none'; }

        function handleInventoryCardClick(id, name) {
            document.getElementById('popupItemTitle').innerText = name;

        function toggleAutoDeleteFilter(itemName) {

        function getRandomItem() {
            let maxWeight = itemsPool[itemsPool.length - 1].rate;
            let rand = Math.random() * maxWeight;
            if (rollCount === 10) rand = rand / 2;
            for (let i = itemsPool.length - 1; i >= 0; i--) {
                if (rand <= maxWeight / itemsPool[i].rate) return itemsPool[i];
            }
            return itemsPool[0];
        }

        function toggleAutoRoll() {
            if (!isAutoRolling) {
                isAutoRolling = true;
                updateAutoRollButtonUI();
                roll();
            } else {
                isAutoRolling = false;
                clearTimeout(currentSpinTimeout);
                updateAutoRollButtonUI();
                if (!document.getElementById('slotText').classList.contains('spinning')) {
                    document.getElementById('rollBtn').disabled = false;
                }
            }
        }

        function roll() {
            const rollBtn = document.getElementById('rollBtn');
            const slotText = document.getElementById('slotText');
            const slotRate = document.getElementById('slotRate');

            rollBtn.disabled = true;
            slotText.classList.add('spinning');
            slotRate.innerText = "1/-";

            let ticks = 0;
            const maxTicks = 12;
            
            const spinInterval = setInterval(() => {
                const randomVisualItem = itemsPool[Math.floor(Math.random() * Math.min(itemsPool.length, 10))];
                slotText.innerText = randomVisualItem.name;
                slotText.style.color = randomVisualItem.text;
                ticks++;

                if (ticks >= maxTicks) {
                    clearInterval(spinInterval);
                    const wonItem = getRandomItem();
                    updateHighestWon(wonItem);
                    
                    slotText.classList.remove('spinning');
                    slotText.innerText = wonItem.name;
                    slotText.style.color = wonItem.text;
                    slotRate.innerText = `1/${wonItem.rate.toLocaleString()}`;

                    if (autoDeleteFilters[wonItem.name]) {
                        slotRate.innerText += " (Auto Deleted)";
                    } else {
                        inventory.push({ name: wonItem.name, rate: wonItem.rate, text: wonItem.text, id: "ITEM_" + Date.now() + "_" + Math.random() });
                        localStorage.setItem('rng_game_inventory', JSON.stringify(inventory));
                    }

                    rollCount = rollCount >= 10 ? 0 : rollCount + 1;
                    document.getElementById('counter').innerText = `${rollCount}/10`;
                    
                    if (isAutoRolling) {
                        currentSpinTimeout = setTimeout(() => { if (isAutoRolling) roll(); }, 600);
                    } else { rollBtn.disabled = false; }
                }
            }, 70);
        }

        function claimPromoCode() {
            const code = document.getElementById('promoInput').value.trim();
            if (!code) { alert("Lütfen bir kod girin!"); return; }

            try {
                const decodedString = decodeURIComponent(escape(atob(code)));
                const payload = JSON.parse(decodedString);

                if (usedTradeIds.includes(payload.packId) || usedTradeIds.includes(payload.id)) {
                    alert("BU PROMO KOD DAHA ÖNCE KULLANILMIŞ VEYA İMHA EDİLMİŞ! 🛑");
                    return;
                }

                let itemsToAdd = [];
                let uniqueId = payload.packId || payload.id || ("PROMO_" + Date.now());

                if (payload.items && Array.isArray(payload.items)) {
                    itemsToAdd = payload.items;
                } else if (payload.name) {
                    itemsToAdd = [payload];
                }

                if (itemsToAdd.length === 0) {
                    alert("Kodun içinde ödül bulunamadı!");
                    return;
                }

                itemsToAdd.forEach(item => {
                    inventory.push({
                        name: item.name,
                        rate: item.rate,
                        text: item.text,
                        id: "ITEM_" + Date.now() + "_" + Math.random()
                    });
                });

                usedTradeIds.push(uniqueId);
                localStorage.setItem('rng_used_trade_ids', JSON.stringify(usedTradeIds));
                localStorage.setItem('rng_game_inventory', JSON.stringify(inventory));

                isAutoRollUnlocked = checkKeyExist();
                updateAutoRollButtonUI();

                alert(`🎁 Tebrikler! Promo kod başarıyla kullanıldı ve envanterinize eklendi!`);
                document.getElementById('promoInput').value = "";
                closePanel('promoScreen');

            } catch (e) {
                alert("Geçersiz veya uyumsuz Promo Kod!");
            }
        }
    

        // ===== Platform: Reborn profil senkronizasyonu =====
        const PLATFORM_REBORN_MESSAGE = 'PLATFORM_REBORN_GAME_STATS';
        const RNG_HIGHEST_KEY = 'rng_highest_item_ever';
        let lastPlatformStatsJSON = '';

        function updateHighestWon(item) {
            if (!item || !item.name) return;
            try {
                const old = JSON.parse(localStorage.getItem(RNG_HIGHEST_KEY) || 'null');
                if (!old || Number(item.rate || 0) > Number(old.rate || 0)) {
                    localStorage.setItem(RNG_HIGHEST_KEY, JSON.stringify({
                        name: item.name,
                        rate: Number(item.rate || 0),
                        text: item.text || '#ffffff'
                    }));
                }
            } catch (_) {}
        }

        function getHighestRngItemEver() {
            let highest = null;
            try { highest = JSON.parse(localStorage.getItem(RNG_HIGHEST_KEY) || 'null'); } catch (_) {}
            for (const item of inventory) {
                if (!highest || Number(item.rate || 0) > Number(highest.rate || 0)) {
                    highest = { name:item.name, rate:Number(item.rate || 0), text:item.text || '#ffffff' };
                }
            }
            if (highest) {
                try { localStorage.setItem(RNG_HIGHEST_KEY, JSON.stringify(highest)); } catch (_) {}
            }
            return highest;
        }

        function buildRngPlatformStats() {
            const equippedDef = itemsPool.find(i => i.name === equippedItemName) || {name:equippedItemName, rate:0, text:'#7c5cff'};
            const counts = {};
            for (const item of inventory) {
                const key = item.name || 'Bilinmeyen';
                counts[key] = (counts[key] || 0) + 1;
            }
            const inventorySummary = Object.keys(counts).map(name => {
                const def = itemsPool.find(i => i.name === name) || inventory.find(i => i.name === name) || {};
                return { name, count:counts[name], rate:Number(def.rate || 0), text:def.text || '#ffffff' };
            }).sort((a,b) => b.rate-a.rate || a.name.localeCompare(b.name));
            return {
                selectedItem:{name:equippedDef.name, rate:Number(equippedDef.rate || 0), text:equippedDef.text || '#7c5cff'},
                inventory:inventorySummary,
                inventoryTotal:inventory.length,
                highestItem:getHighestRngItemEver(),
                updatedAt:Date.now()
            };
        }

        function syncRngStatsToPlatform(force=false) {
            const stats = buildRngPlatformStats();
            const json = JSON.stringify(stats);
            if (!force && json === lastPlatformStatsJSON) return;
            lastPlatformStatsJSON = json;
            const message = {type:PLATFORM_REBORN_MESSAGE, game:'rng', version:1, stats};
            try { if (window.parent && window.parent !== window) window.parent.postMessage(message, '*'); } catch (_) {}
            try { if (window.opener && !window.opener.closed) window.opener.postMessage(message, '*'); } catch (_) {}
        }

        setInterval(() => syncRngStatsToPlatform(false), 2500);
        document.addEventListener('visibilitychange', () => { if (document.visibilityState === 'hidden') syncRngStatsToPlatform(true); });
        window.addEventListener('pagehide', () => syncRngStatsToPlatform(true));
        window.addEventListener('message', e => {
            if (e.data && e.data.type === 'PLATFORM_REBORN_REQUEST_STATS') syncRngStatsToPlatform(true);
        });
        setTimeout(() => syncRngStatsToPlatform(true), 500);

</script>
